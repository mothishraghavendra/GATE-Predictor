<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GATE Mark Predictor{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>🎯 GATE Mark Predictor</h1>
                <p class="subtitle">Upload your response sheet URL to predict your marks</p>
            </div>
        </header>
        
        <main>
            {% block content %}{% endblock %}
        </main>
        
        <footer>
            <p>&copy; 2026 GATE Mark Predictor | Powered by <a href="https://serblabs.in" target="_blank">SerbLabs</a></p>
            <p class="disclaimer">Disclaimer: This is an estimation tool. Actual marks may vary based on answer key and normalization.</p>
        </footer>
    </div>
    
    {% block scripts %}{% endblock %}
</body>
</html>
